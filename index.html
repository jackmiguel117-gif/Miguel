<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Une question importante 💝</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fce4ec 0%, #f8bbd9 50%, #f48fb1 100%);
      padding: 2rem;
      overflow: hidden;
      position: relative;
      font-family: Georgia, serif;
    }
    .hearts-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .heart-float {
      position: absolute;
      opacity: 0.15;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0%   { transform: translateY(100vh) rotate(0deg); opacity: 0.15; }
      100% { transform: translateY(-120px) rotate(20deg); opacity: 0; }
    }
    .card {
      background: white;
      border-radius: 24px;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(233, 30, 99, 0.2);
      position: relative;
      z-index: 10;
    }
    .emoji-big {
      font-size: 72px;
      display: block;
      margin-bottom: 1.5rem;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.12); }
    }
    .question {
      font-size: 1.7rem;
      font-weight: 700;
      color: #880e4f;
      line-height: 1.35;
      margin-bottom: 2.5rem;
    }
    .btn-oui {
      background: linear-gradient(135deg, #e91e63, #ad1457);
      color: white;
      border: none;
      padding: 16px 52px;
      font-size: 1.2rem;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 1px;
      box-shadow: 0 6px 20px rgba(233,30,99,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-oui:hover {
      transform: scale(1.07);
      box-shadow: 0 10px 28px rgba(233,30,99,0.45);
    }
    .btn-non {
      background: #f5f5f5;
      color: #bbb;
      border: 2px solid #eee;
      padding: 13px 40px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      position: fixed;
      z-index: 9999;
      white-space: nowrap;
      font-family: Georgia, serif;
    }
    .win-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .win-screen.active { display: flex; }
    .win-emoji {
      font-size: 88px;
      animation: bounce 0.6s ease infinite alternate;
    }
    @keyframes bounce { to { transform: translateY(-12px); } }
    .win-title {
      font-size: 2.2rem;
      font-weight: 700;
      color: #880e4f;
    }
    .win-sub {
      font-size: 1.1rem;
      color: #c2185b;
      line-height: 1.5;
    }
    .confetti-piece {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 99999;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="hearts-bg" id="heartsBg"></div>

  <div class="card">
    <div id="mainContent">
      <span class="emoji-big">💝</span>
      <p class="question">Veux-tu être<br>ma petite amie&nbsp;?</p>
      <button class="btn-oui" onclick="ouiClicked()">Oui 💖</button>
    </div>

    <div class="win-screen" id="winScreen">
      <span class="win-emoji">🥰</span>
      <p class="win-title">Yesssss&nbsp;!!</p>
      <p class="win-sub">Tu as fait le meilleur choix de ta vie 😍💕</p>
    </div>
  </div>

  <button class="btn-non" id="btnNon">Non 🙅</button>

  <script>
    const btnNon = document.getElementById('btnNon');
    let vpW = window.innerWidth;
    let vpH = window.innerHeight;
    const btnW = 150, btnH = 52;
    let posX = vpW / 2 + 80;
    let posY = vpH / 2;
    let isMoving = false;

    function placeBtn() {
      btnNon.style.left = posX + 'px';
      btnNon.style.top  = posY + 'px';
    }
    placeBtn();

    function moveNonBtn() {
      if (isMoving) return;
      isMoving = true;
      const margin = 20;
      posX = margin + Math.random() * (vpW - btnW - margin * 2);
      posY = margin + Math.random() * (vpH - btnH - margin * 2);
      btnNon.style.transition = 'left 0.22s cubic-bezier(0.34,1.56,0.64,1), top 0.22s cubic-bezier(0.34,1.56,0.64,1)';
      placeBtn();
      setTimeout(() => { isMoving = false; btnNon.style.transition = 'none'; }, 280);
    }

    btnNon.addEventListener('mouseover', moveNonBtn);
    btnNon.addEventListener('touchstart', e => { e.preventDefault(); moveNonBtn(); });

    window.addEventListener('resize', () => {
      vpW = window.innerWidth;
      vpH = window.innerHeight;
      placeBtn();
    });

    function createHearts() {
      const bg = document.getElementById('heartsBg');
      const emojis = ['❤️','💕','💗','💓','💖','🌸'];
      for (let i = 0; i < 20; i++) {
        const h = document.createElement('div');
        h.className = 'heart-float';
        h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        h.style.left = Math.random() * 100 + '%';
        h.style.fontSize = (12 + Math.random() * 18) + 'px';
        h.style.animationDuration = (6 + Math.random() * 9) + 's';
        h.style.animationDelay   = (Math.random() * 8) + 's';
        bg.appendChild(h);
      }
    }
    createHearts();

    function launchConfetti() {
      const colors = ['#e91e63','#f48fb1','#ff4081','#ff80ab','#ad1457','#ffd6e0','#ffb3c6','#fff'];
      for (let i = 0; i < 90; i++) {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        c.style.left   = Math.random() * 100 + 'vw';
        c.style.top    = '-10px';
        c.style.width  = (6 + Math.random() * 8) + 'px';
        c.style.height = (6 + Math.random() * 8) + 'px';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.animationDuration = (1.5 + Math.random() * 2.5) + 's';
        c.style.animationDelay   = Math.random() * 0.8 + 's';
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 5000);
      }
    }

    function ouiClicked() {
      document.getElementById('mainContent').style.display = 'none';
      document.getElementById('winScreen').classList.add('active');
      btnNon.style.display = 'none';
      launchConfetti();
      setTimeout(launchConfetti, 700);
      setTimeout(launchConfetti, 1400);
    }
  </script>
</body>
</html>
